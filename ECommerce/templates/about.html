{% extends 'base.html' %}
{% load static %}

{% block body %}
<link rel="stylesheet" href="{% static 'css/page.css' %}">

<div class="page-static">
    <h2 class="page-static__title">{{ page.title }}</h2>
    <hr class="page-static__divider">

    <div class="page-static__content">
        {{ page.content|linebreaks }}
    </div>

    <p class="page-static__updated">
        Last updated: {{ page.updated|date:"F j, Y" }}
    </p>
</div>
{% endblock %}
